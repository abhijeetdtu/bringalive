name: imagegen
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu128
      - torch==2.7.0+cu128
      - torchvision==0.22.0+cu128
      - torchaudio==2.7.0+cu128
      - git+https://github.com/huggingface/diffusers
      - transformers
      - accelerate
      - safetensors
      - sentencepiece
      - huggingface_hub[hf_xet]
